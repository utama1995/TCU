<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Maintenance Aset</title>
<link rel="icon" type="image/png" href="icon.png">

<style>

/* =============================== */
/* BODY */
/* =============================== */
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
box-sizing:border-box;
}

/* =============================== */
/* CONTAINER */
/* =============================== */
.login-container{
background:white;
width:100%;
max-width:420px;
border-radius:14px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
overflow:hidden;
}

/* =============================== */
/* BANNER */
/* =============================== */
.banner{
width:100%;
height:150px;
background:url("Banner Utama.png") center center;
background-size:cover;
}

/* =============================== */
/* FORM AREA */
/* =============================== */
.form-area{
padding:30px 25px;
}

.form-area h2{
margin-top:0;
text-align:center;
color:#333;
font-size:20px;
}

/* =============================== */
/* INPUT */
/* =============================== */
.form-area input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
transition:0.3s;
}

.form-area input:focus{
border-color:#2c5364;
outline:none;
box-shadow:0 0 6px rgba(44,83,100,0.4);
}

/* =============================== */
/* BUTTON */
/* =============================== */
.form-area button{
width:100%;
padding:14px;
margin-top:18px;
background:#2c5364;
color:white;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.form-area button:hover{
background:#203a43;
}

/* =============================== */
/* STATUS */
/* =============================== */
#status{
text-align:center;
margin-top:15px;
font-size:14px;
color:#333;
min-height:20px;
}

/* =============================== */
/* FOOTER */
/* =============================== */
.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:20px;
}

/* =============================== */
/* MOBILE OPTIMIZATION */
/* =============================== */
@media (max-width:480px){

.banner{
height:130px;
}

.form-area{
padding:25px 20px;
}

.form-area h2{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="login-container">

<div class="banner"></div>

<div class="form-area">

<h2>Login System</h2>

<input id="username" placeholder="Username">

<div style="position:relative;">

<input id="password" type="password" placeholder="Password" style="padding-right:45px;">

<span onclick="togglePassword()" 
        style="
        position:absolute;
        right:12px;
        top:50%;
        bottom:50%;
        transform:translateY(-50%);
        cursor:pointer;
        font-size:12px;
        user-select:none;
        color:#999;
">
Menyembunyikan
</span>

</div>

<button onclick="login()">Login</button>

<p id="status"></p>

<div class="footer">
Maintenance Asset Management System
<br>Toko Cat Utama
</div>

</div>
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxWB6oZ2jIyyVQjUjUx76BaCqnwgrMIfaz33pEpCmls4gmYwrpLq7LNQ5oP1zN254YqAg/exec";

async function login(){

document.getElementById("status").innerText="Memproses login...";

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

try{

const res = await fetch(API_URL,{
  method:"POST",
  headers:{
    "Content-Type":"application/x-www-form-urlencoded"
  },
  body:
    "action=login" +
    "&username=" + encodeURIComponent(username) +
    "&password=" + encodeURIComponent(password)
});

const data = await res.json(); // ✅ WAJIB

if(data.success){

localStorage.setItem("token",data.token);
localStorage.setItem("role",data.role);
localStorage.setItem("username",username);
localStorage.setItem("userPassword",password);

document.getElementById("status").innerText="Login berhasil";

setTimeout(()=>{
if(data.role==="admin"){
window.location.href="admin.html";
}else{
window.location.href="index.html";
}
},500);

}else{
document.getElementById("status").innerText="Username atau password salah";
}

}catch(err){
console.error(err);
document.getElementById("status").innerText="Koneksi gagal";
}

}

function togglePassword(){
  const input = document.getElementById("password");
  const eye = event.target;

  if(input.type === "password"){
    input.type = "text";
    eye.innerText = "Menunjukkan";
  }else{
    input.type = "password";
    eye.innerText = "Menyembunyikan";
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Maintenance Aset</title>
<link rel="icon" type="image/png" href="icon.png">

<style>

/* =============================== */
/* BODY */
/* =============================== */
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
box-sizing:border-box;
}

/* =============================== */
/* CONTAINER */
/* =============================== */
.login-container{
background:white;
width:100%;
max-width:420px;
border-radius:14px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
overflow:hidden;
}

/* =============================== */
/* BANNER */
/* =============================== */
.banner{
width:100%;
height:150px;
background:url("Banner Utama.png") center center;
background-size:cover;
}

/* =============================== */
/* FORM AREA */
/* =============================== */
.form-area{
padding:30px 25px;
}

.form-area h2{
margin-top:0;
text-align:center;
color:#333;
font-size:20px;
}

/* =============================== */
/* INPUT */
/* =============================== */
.form-area input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
transition:0.3s;
}

.form-area input:focus{
border-color:#2c5364;
outline:none;
box-shadow:0 0 6px rgba(44,83,100,0.4);
}

/* =============================== */
/* CHECKBOX REMEMBER */
/* =============================== */
.remember-section{
margin-top:12px;
display:flex;
align-items:center;
gap:8px;
}

.remember-section input[type="checkbox"]{
width:16px;
height:16px;
cursor:pointer;
}

.remember-section label{
font-size:13px;
color:#555;
cursor:pointer;
margin:0;
}

/* =============================== */
/* BUTTON */
/* =============================== */
.form-area button{
width:100%;
padding:14px;
margin-top:18px;
background:#2c5364;
color:white;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

.form-area button:hover{
background:#203a43;
}

/* =============================== */
/* STATUS */
/* =============================== */
#status{
text-align:center;
margin-top:15px;
font-size:14px;
color:#333;
min-height:20px;
}

/* =============================== */
/* FOOTER */
/* =============================== */
.footer{
text-align:center;
font-size:12px;
color:#777;
margin-top:20px;
}

/* =============================== */
/* MOBILE OPTIMIZATION */
/* =============================== */
@media (max-width:480px){

.banner{
height:130px;
}

.form-area{
padding:25px 20px;
}

.form-area h2{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="login-container">

<div class="banner"></div>

<div class="form-area">

<h2>Login System</h2>

<input id="username" placeholder="username">

<div style="position:relative;">

<input id="password" type="password" placeholder="password" style="padding-right:45px;">

<span onclick="togglePassword()" 
        style="
        position:absolute;
        right:12px;
        top:50%;
        bottom:50%;
        transform:translateY(-50%);
        cursor:pointer;
        font-size:12px;
        user-select:none;
        color:#999;
">
👁
</span>

</div>

<div class="remember-section">
<input type="checkbox" id="rememberUsername">
<label for="rememberUsername">Simpan username</label>
</div>

<button onclick="login()">Login</button>

<p id="status"></p>

<div class="footer">
Maintenance Asset Management System
<br>Toko Cat Utama
</div>

</div>
</div>

<script src="config.js"></script>
<script>

document.addEventListener("DOMContentLoaded", function(){
  // Load username yang tersimpan saat halaman dimuat
  loadSavedUsername();
  
  ["username", "password"].forEach(function(id){
    const input = document.getElementById(id);
    if(!input) return;

    input.addEventListener("keydown", function(event){
      if(event.key === "Enter"){
        event.preventDefault();
        login();
      }
    });
  });
});

// Fungsi untuk load username dari localStorage
function loadSavedUsername(){
  const savedUsername = localStorage.getItem("savedUsername");
  const rememberCheckbox = document.getElementById("rememberUsername");
  
  if(savedUsername){
    document.getElementById("username").value = savedUsername;
    rememberCheckbox.checked = true;
  }
}

// Fungsi untuk simpan username
function saveUsername(username){
  const rememberCheckbox = document.getElementById("rememberUsername");
  
  if(rememberCheckbox.checked){
    localStorage.setItem("savedUsername", username);
  } else {
    localStorage.removeItem("savedUsername");
  }
}

// Fungsi untuk hapus username yang tersimpan
function clearSavedUsername(){
  localStorage.removeItem("savedUsername");
  document.getElementById("rememberUsername").checked = false;
}
        
async function login() {
  const status = document.getElementById("status");
  status.innerText = "Memproses login...";

  const username = document.getElementById("username").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: `action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    });

    const data = await res.json();

    // Ganti bagian di dalam if(data.success) pada login.html
    if (data.success) {
    localStorage.setItem("token", data.token);
    localStorage.setItem("role", data.role);
    localStorage.setItem("username", data.username);
    
    // Simpan atau hapus username berdasarkan checkbox
    saveUsername(username);

    // HANYA lempar ke reset sika backend bilang ini benar-benar login PERTAMA
    if (data.first_login === true) {
        document.getElementById("status").innerText = "Pengguna baru, silakan ganti password...";
        setTimeout(() => {
            window.location.href = "reset-first-password.html";
        }, 800);
    } else {
        // Jika sudah pernah login (first_login: false), LANGSUNG ke index
        document.getElementById("status").innerText = "Login Berhasil, mengalihkan...";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 800);
    }
} else {
      status.innerText = "Username atau password salah / Akun tidak aktif";
    }
  } catch (error) {
    status.innerText = "Koneksi ke database gagal";
    console.error(error);
  }
}

async function handleLogin() {
  const status = document.getElementById("status");
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  status.innerText = "Memproses login...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: `action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("role", data.role);
      localStorage.setItem("username", data.username);
      
      // Simpan atau hapus username berdasarkan checkbox
      saveUsername(username);

      // JIKA DATA LOGIN PERTAMA KALI (KOLOM LASTLOGIN KOSONG)
      if (data.first_login) {
        status.innerText = "Login pertama terdeteksi. Silakan ganti password.";
        setTimeout(() => {
          window.location.href = "reset-first-password.html";
        }, 1000);
      } else {
        // JIKA SUDAH PERNAH LOGIN SEBELUMNYA
        status.innerText = "Selamat datang kembali!";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);
      }
    } else {
      status.innerText = "Gagal: " + (data.message || "Akun tidak ditemukan");
    }
  } catch (e) {
    status.innerText = "Error koneksi.";
  }
}
        
function togglePassword(){
  const input = document.getElementById("password");
  const eye = event.target;

  if(input.type === "password"){
    input.type = "text";
    eye.innerText = "👁";
  }else{
    input.type = "password";
    eye.innerText = "🚫";
  }
}
</script>

</body>
</html>

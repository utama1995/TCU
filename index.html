<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal Maintenance Aset</title>

<style>

.banner{
width:100%;
margin-bottom:15px;
border-radius:8px;
}

  
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
width:100%;
padding:15px;
margin-top:10px;
background:#1976d2;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0d47a1;
}

</style>

</head>
<script>
const token = localStorage.getItem("token");
const role  = localStorage.getItem("role");

if(!token){
  window.location.href="login.html";
}

if(role === "admin"){
  window.location.href="admin.html";
}
</script>

<body>

<div class="container">

<img src="Banner Utama.png" class="banner">

<h2>PORTAL MAINTENANCE ASET</h2>

<button onclick="logout()" style="
background:#e74c3c;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
margin-bottom:15px;
">
Logout
</button>


<a href="lapor.html">
<button>LAPOR KERUSAKAN</button>
</a>

<a href="cek.html">
<button>CEK STATUS</button>
</a>

</div>
<script>
function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("role");
  window.location.href="login.html";
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapor Bolo</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
}

.container{
background:white;
width:100%;
max-width:420px;
border-radius:14px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
padding:30px 25px;
text-align:center;
}

.banner{
width:100%;
margin-bottom:20px;
border-radius:10px;
}

h2{
margin-top:0;
margin-bottom:25px;
font-size:20px;
}

button{
width:100%;
padding:15px;
margin-top:12px;
background:#2c5364;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#203a43;
}

.admin-btn{
background:#8e44ad;
}

.logout-btn{
background:#e74c3c;
}
</style>
</head>

<body>

  <div class="container">
    <img src="Banner Utama.png" class="banner" alt="Banner">

    <h2>LAPOR BOLO</h2>

    <div id="userInfo">Memuat data user...</div>

    <a href="lapor.html"><button>LAPOR KERUSAKAN</button></a>
    <a href="cek.html"><button>CEK STATUS</button></a>

    <div id="adminSection" style="display:none;">
        <a href="admin.html"><button class="admin-btn">⚙ PANEL ADMIN</button></a>
    </div>

    <a href="ubah-password.html">
        <button style="background:#f39c12;">UBAH PASSWORD</button>
    </a>

    <button class="logout-btn" onclick="logout()">LOGOUT</button>
</div>

<script>
    // 1. Validasi Token & Ambil Data
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");
    const username = localStorage.getItem("username");

    // Jika tidak ada token, tendang ke login
    if (!token) {
        window.location.href = "login.html";
    }

    // 2. Jalankan Fungsi setelah halaman dimuat
    document.addEventListener("DOMContentLoaded", function() {
        // Update Info User
        const userInfoEl = document.getElementById("userInfo");
        if (username) {
            userInfoEl.innerHTML = `Selamat datang <b>${username}</b>`;
        }

        // Cek Role Admin
        if (role === "admin") {
            document.getElementById("adminSection").style.display = "block";
        }
    });

    // 3. Fungsi Logout (Global Scope agar bisa dipanggil onclick)
    function logout() {
        if (confirm("Apakah Anda yakin ingin keluar?")) {
            localStorage.clear();
            window.location.href = "login.html";
        }
    }
</script>
  
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapor Bolo - Home</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 15px;
    }

    .container {
        background: white;
        width: 100%;
        max-width: 420px;
        border-radius: 14px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        padding: 30px 25px;
        text-align: center;
    }

    .banner {
        width: 100%;
        margin-bottom: 20px;
        border-radius: 10px;
    }

    h2 { margin: 0 0 25px 0; font-size: 20px; color: #333; }

    #userInfo {
        margin-bottom: 25px;
        padding: 12px;
        background: #f1f4f6;
        border-radius: 8px;
        font-size: 15px;
        color: #2c3e50;
        font-weight: bold;
        border-left: 5px solid #2c5364;
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 12px;
        background: #2c5364;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    button:hover { background: #203a43; transform: translateY(-2px); }

    .admin-btn { background: #8e44ad; }
    .admin-btn:hover { background: #7d3c98; }

    /* Pemisah tombol logout */
    .separator {
        margin-top: 30px;
        border: 0;
        border-top: 1px solid #eee;
    }

    .logout-btn { 
        background: #e74c3c; 
        margin-top: 15px; /* Jarak tambahan setelah garis */
        font-size: 13px;
        padding: 12px;
    }
    .logout-btn:hover { background: #c0392b; }
</style>
</head>

<body>

<div class="container">
    <img src="Banner Utama.png" class="banner" alt="Banner">

    <h2>LAPOR BOLO</h2>

    <div id="userInfo">Memuat nama...</div>

    <a href="lapor.html"><button>LAPOR KERUSAKAN</button></a>
    <a href="cek.html"><button>CEK STATUS</button></a>

    <div id="adminSection" style="display:none;">
        <a href="admin.html"><button class="admin-btn">⚙ PANEL ADMIN</button></a>
    </div>

    <a href="ubah-password.html">
        <button style="background:#f39c12;">UBAH PASSWORD</button>
    </a>

    <hr class="separator">
    <button class="logout-btn" onclick="logout()">LOGOUT</button>
</div>

<script src="config.js"></script>
<script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");
    const fullUsername = localStorage.getItem("username") || "";

    if (!token) {
        window.location.href = "login.html";
    }

    const displayName = fullUsername.split('@')[0].toUpperCase();

    document.addEventListener("DOMContentLoaded", function() {
        const userInfoEl = document.getElementById("userInfo");
        if (userInfoEl) {
            userInfoEl.innerHTML = `Selamat Datang, ${displayName}`;
        }

        if (role === "admin") {
            const adminBox = document.getElementById("adminSection");
            if (adminBox) adminBox.style.display = "block";
        }
    });

    function logout() {
        if (confirm("Apakah Anda yakin ingin keluar?")) {
            // Simpan savedUsername sebelum clear
            const savedUsername = localStorage.getItem("savedUsername");
            
            // Clear semua localStorage
            localStorage.clear();
            
            // Restore savedUsername jika ada
            if (savedUsername) {
                localStorage.setItem("savedUsername", savedUsername);
            }
            
            window.location.href = "login.html";
        }
    }
</script>

</body>
</html>

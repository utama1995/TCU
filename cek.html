<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cek Status Maintenance</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
box-sizing:border-box;
}

.container{
background:white;
width:100%;
max-width:480px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
box-sizing:border-box;
}

h2{
text-align:center;
margin-top:0;
color:#333;
font-size:20px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#2c5364;
outline:none;
box-shadow:0 0 5px rgba(44,83,100,0.5);
}

button{
width:100%;
padding:14px;
margin-top:12px;
background:#2c5364;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
background:#203a43;
}

.result{
margin-top:20px;
padding:15px;
background:#f9f9f9;
border-radius:8px;
font-size:14px;
word-wrap:break-word;
}

.label{
font-weight:bold;
margin-top:10px;
}

.value{
margin-bottom:8px;
}

.status-open{
color:#f39c12;
font-weight:bold;
}

.status-progress{
color:#3498db;
font-weight:bold;
}

.status-done{
color:#27ae60;
font-weight:bold;
}

img{
margin-top:10px;
max-width:100%;
border-radius:8px;
}

a{
display:block;
margin-top:15px;
}

@media (max-width:480px){

.container{
padding:20px;
border-radius:10px;
}

h2{
font-size:18px;
}

}

</style>
  
</head>

<body>
<script>
const token = localStorage.getItem("token");

if(!token){
  alert("Silakan login terlebih dahulu");
  window.location.href="login.html";
}
</script>

<div class="container">

<h2>CEK STATUS LAPORAN</h2>

<input type="text" id="ticket" placeholder="Masukkan Ticket ID">

<button onclick="cekStatus()">CEK STATUS</button>

<div id="hasil" class="result"></div>

<br>

<a href="index.html">
<button style="
background:#6c757d;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
">
← Kembali ke Menu Utama
</button>
</a>

</div>

<script src="config.js"></script>
<script src="cek.js"></script>

</body>
</html>

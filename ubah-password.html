<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubah Password</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:100%;
max-width:420px;
padding:30px;
border-radius:12px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-top:0;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border-radius:8px;
border:none;
background:#2c5364;
color:white;
cursor:pointer;
}

#status{
margin-top:15px;
text-align:center;
}
</style>
</head>

<body>

<script>
const token = localStorage.getItem("token");
if(!token){
alert("Silakan login terlebih dahulu");
window.location.href="login.html";
}
</script>

<div class="container">
<h2>Ubah Password</h2>

<input type="password" id="oldPassword" placeholder="Password Lama">
<input type="password" id="newPassword" placeholder="Password Baru (min 8 karakter)">
<input type="password" id="confirmPassword" placeholder="Konfirmasi Password Baru">

<button onclick="ubahPassword()">Simpan</button>

<p id="status"></p>

<br>
<a href="index.html">
<button style="background:#6c757d;">Kembali</button>
</a>
</div>

<script src="config.js"></script>

<script>
async function ubahPassword(){

const oldPass = document.getElementById("oldPassword").value;
const newPass = document.getElementById("newPassword").value;
const confirm = document.getElementById("confirmPassword").value;

const status = document.getElementById("status");

if(newPass.length < 8){
status.innerText="Password minimal 8 karakter";
return;
}

if(newPass !== confirm){
status.innerText="Konfirmasi password tidak sama";
return;
}

const username = localStorage.getItem("username");

const formData = new FormData();
formData.append("action","changePassword");
formData.append("username",username);
formData.append("oldPassword",oldPass);
formData.append("newPassword",newPass);

try{
const res = await fetch(API_URL,{method:"POST",body:formData});
const data = await res.json();

if(data.success){
status.innerText="Password berhasil diubah";
}else{
status.innerText="Password lama salah";
}

}catch{
status.innerText="Koneksi gagal";
}

}
</script>

</body>
</html>

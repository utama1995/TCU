<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubah Password</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:100%;
max-width:420px;
padding:30px;
border-radius:12px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
box-sizing:border-box;
}

h2{
text-align:center;
margin-top:0;
}

/* PASSWORD GROUP */
.password-group{
position:relative;
margin-top:12px;
}

.password-group input{
width:100%;
padding:14px;
padding-right:45px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

.toggle-eye{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:16px;
color:#888;
user-select:none;
}

.toggle-eye:hover{
color:#2c5364;
}

button{
width:100%;
padding:14px;
margin-top:18px;
border-radius:8px;
border:none;
background:#2c5364;
color:white;
cursor:pointer;
}

button:hover{
background:#203a43;
}

#status{
margin-top:15px;
text-align:center;
font-size:14px;
min-height:20px;
}
</style>
</head>

<body>

<script>
const token = localStorage.getItem("token");
if(!token){
alert("Silakan login terlebih dahulu");
window.location.href="login.html";
}
</script>

<div class="container">
<h2>Ubah Password</h2>

<div class="password-group">
  <input type="password" id="oldPassword" placeholder="Password Lama">
  <span class="toggle-eye" onclick="togglePassword('oldPassword', this)">👁</span>
</div>

<div class="password-group">
  <input type="password" id="newPassword" placeholder="Password Baru (min 8 karakter)">
  <span class="toggle-eye" onclick="togglePassword('newPassword', this)">👁</span>
</div>

<div class="password-group">
  <input type="password" id="confirmPassword" placeholder="Konfirmasi Password Baru">
  <span class="toggle-eye" onclick="togglePassword('confirmPassword', this)">👁</span>
</div>

<button id="btnSimpan" onclick="ubahPassword()">Simpan</button>

<p id="status"></p>

<br>
<a href="index.html">
<button style="background:#6c757d;">Kembali</button>
</a>

</div>

<script src="config.js"></script>

<script>

let isProcessing = false;

function togglePassword(id, element){
  const input = document.getElementById(id);

  if(input.type === "password"){
    input.type = "text";
    element.innerText = "🚫";
  }else{
    input.type = "password";
    element.innerText = "👁";
  }
}

async function ubahPassword(){

if(isProcessing) return;
isProcessing = true;

const btn = document.getElementById("btnSimpan");
const status = document.getElementById("status");

btn.disabled = true;
btn.innerText = "Memproses...";

const oldPass = document.getElementById("oldPassword").value.trim();
const newPass = document.getElementById("newPassword").value.trim();
const confirm = document.getElementById("confirmPassword").value.trim();
const username = localStorage.getItem("username");

// =====================
// VALIDASI DASAR
// =====================
if(!username){
status.innerText="Session tidak valid. Silakan login ulang.";
return resetButton();
}

if(!oldPass || !newPass || !confirm){
status.innerText="Semua field wajib diisi";
return resetButton();
}

if(newPass.length < 8){
status.innerText="Password minimal 8 karakter";
return resetButton();
}

if(newPass !== confirm){
status.innerText="Konfirmasi password tidak sama";
return resetButton();
}

// =====================
// KIRIM KE BACKEND
// =====================
try{

const res = await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:
"action=changePassword" +
"&username=" + encodeURIComponent(username) +
"&oldPassword=" + encodeURIComponent(oldPass) +
"&newPassword=" + encodeURIComponent(newPass) +
"&token=" + encodeURIComponent(localStorage.getItem("token"))
});

if(!res.ok){
status.innerText="Server tidak merespon";
return resetButton();
}

const data = await res.json();

if(data.session_expired){
  alert("Session berakhir. Silakan login ulang.");
  localStorage.clear();
  window.location.href="login.html";
  return;
}
  
if(data.success){

status.innerText="Password berhasil diubah. Silakan login ulang.";

setTimeout(()=>{
localStorage.clear();
window.location.href="login.html";
},1200);

}else{

status.innerText="Password lama salah";
}

}catch(error){

console.error("ERROR:", error);
status.innerText="Terjadi kesalahan koneksi";

}

resetButton();
}

function resetButton(){
  const btn = document.getElementById("btnSimpan");
  btn.disabled = false;
  btn.innerText = "Simpan";
  isProcessing = false;
}

</script>

</body>
</html>

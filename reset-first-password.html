<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password Pertama - Lapor Bolo</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 15px;
    }

    .container {
        background: white;
        width: 100%;
        max-width: 420px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        box-sizing: border-box;
        text-align: center;
    }

    h2 { color: #333; margin-top: 0; font-size: 20px; }
    p { font-size: 14px; color: #666; margin-bottom: 20px; }

    /* Penampung Input & Tombol Mata */
    .password-wrapper {
        position: relative;
        width: 100%;
        margin-top: 10px;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-sizing: border-box;
        font-size: 14px;
    }

    .eye-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #999;
        font-size: 18px;
        user-select: none;
    }

    .btn-save {
        width: 100%;
        padding: 14px;
        margin-top: 25px;
        background: #27ae60;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-save:hover { background: #219150; }

    .logout-btn {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #e74c3c;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
    }

    #status {
        margin-top: 15px;
        font-size: 13px;
        color: #e67e22;
        min-height: 20px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Ganti Password Baru</h2>
    <p>Silakan ganti password default <b>utama123</b> Anda agar dapat masuk ke sistem.</p>

    <div class="password-wrapper">
        <input type="password" id="newPass" placeholder="Password Baru (min. 8 karakter)">
        <span class="eye-icon" onclick="toggleVisibility('newPass')">👁️</span>
    </div>

    <div class="password-wrapper">
        <input type="password" id="confirmPass" placeholder="Konfirmasi Password Baru">
        <span class="eye-icon" onclick="toggleVisibility('confirmPass')">👁️</span>
    </div>

    <button class="btn-save" onclick="handleReset()">SIMPAN PASSWORD</button>
    
    <div id="status"></div>

    <hr style="margin: 25px 0 15px; border: 0; border-top: 1px solid #eee;">
    
    <button class="logout-btn" onclick="logout()">Batal & Logout</button>
</div>

<script src="config.js"></script>
<script>
    const username = localStorage.getItem("username");
    const token = localStorage.getItem("token");

    if(!username || !token) {
        window.location.href = "login.html";
    }

    // FUNGSI LIHAT PASSWORD
    function toggleVisibility(id) {
        const input = document.getElementById(id);
        const icon = event.target;
        if (input.type === "password") {
            input.type = "text";
            icon.innerText = "🚫"; // Ikon saat password terlihat
        } else {
            input.type = "password";
            icon.innerText = "👁️"; // Ikon saat password tersembunyi
        }
    }

    // FUNGSI LOGOUT GLOBAL
    function logout() {
        if (confirm("Batal melakukan reset dan keluar?")) {
            localStorage.clear();
            window.location.href = "login.html";
        }
    }

    async function handleReset() {
        const newPass = document.getElementById("newPass").value;
        const confirmPass = document.getElementById("confirmPass").value;
        const status = document.getElementById("status");

        if (newPass.length < 8) {
            status.innerText = "Password minimal 8 karakter!";
            return;
        }

        if (newPass !== confirmPass) {
            status.innerText = "Konfirmasi password tidak cocok!";
            return;
        }

        status.innerText = "Sedang menyimpan...";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `action=changePassword&username=${encodeURIComponent(username)}&oldPassword=utama123&newPassword=${encodeURIComponent(newPass)}&token=${encodeURIComponent(token)}`
            });

            const data = await res.json();

            if (data.success) {
                alert("Berhasil! Silakan login kembali dengan password baru Anda.");
                localStorage.clear();
                window.location.href = "login.html";
            } else {
                status.innerText = "Gagal. Sesi mungkin habis, silakan login ulang.";
            }
        } catch (e) {
            status.innerText = "Kesalahan koneksi ke server.";
        }
    }
</script>

</body>
</html>

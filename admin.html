<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Maintenance Aset</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
width:95%;
max-width:1200px;
margin:30px auto;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:#2c5364;
color:white;
}

.logout-btn{
background:#e74c3c;
border:none;
padding:8px 15px;
color:white;
border-radius:6px;
cursor:pointer;
}

.content{
padding:25px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c5364;
color:white;
padding:12px;
font-size:14px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
font-size:14px;
}

tr:hover{
background:#f8f8f8;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2c5364;
color:white;
}

.status{
padding:4px 10px;
border-radius:20px;
color:white;
font-size:12px;
font-weight:600;
}

.waiting{background:#f39c12;}
.process{background:#3498db;}
.done{background:#27ae60;}

.footer{
text-align:center;
padding:15px;
font-size:12px;
color:#777;
}

/* ========================= */
/* MODAL */
/* ========================= */

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(3px);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
width:95%;
max-width:480px;
padding:25px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.35);
animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{
from{transform:translateY(-10px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

.modal-content h3{
margin-top:0;
margin-bottom:20px;
font-size:20px;
font-weight:600;
color:#2c5364;
text-align:center;
}

.modal-content label{
display:block;
font-size:13px;
font-weight:600;
margin-top:12px;
margin-bottom:5px;
color:#555;
}

.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
box-sizing:border-box;
transition:0.3s;
}

.modal-content input:focus,
.modal-content textarea:focus,
.modal-content select:focus{
border-color:#2c5364;
outline:none;
box-shadow:0 0 6px rgba(44,83,100,0.4);
}

.modal-content button{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
font-size:14px;
font-weight:600;
border:none;
cursor:pointer;
transition:0.3s;
}

.save-btn{
background:#27ae60;
color:white;
}

.save-btn:hover{
background:#219150;
}

.cancel-btn{
background:#95a5a6;
color:white;
}

.cancel-btn:hover{
background:#7f8c8d;
}

</style>
</head>

<body>

<script>
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(!token || role !== "admin"){
alert("Akses ditolak");
window.location.href="login.html";
}
</script>

<div class="container">

<div class="header">
<h2>Admin Panel - Maintenance Aset</h2>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="content">

<h3>Daftar Laporan</h3>

<table id="tabel">
<thead>
<tr>
<th>Ticket ID</th>
<th>Pelapor</th>
<th>Aset</th>
<th>Deskripsi</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr>
<td colspan="6">Loading...</td>
</tr>
</tbody>
</table>

</div>

<div class="footer">
Maintenance Asset Management System
</div>

</div>

<!-- MODAL -->
<div id="editModal" class="modal">
<div class="modal-content">

<h3>Edit Ticket</h3>

<label>Ticket ID</label>
<input id="edit_ticket" readonly>

<label>Status</label>
<select id="edit_status">
<option value="Waiting">Waiting</option>
<option value="On Progress">On Progress</option>
<option value="Done">Done</option>
</select>

<label>Catatan GA</label>
<textarea id="edit_catatan"></textarea>

<label>Vendor</label>
<input id="edit_vendor">

<button class="save-btn" onclick="saveEdit()">Save</button>
<button class="cancel-btn" onclick="closeModal()">Cancel</button>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyb0Sq7mGnevWpX0OtgnN-JOQ20TiJAOG2gx6df6_s83iQDzGj2bPLY_uGQ66U_3VI_nQ/exec";

function logout(){
localStorage.removeItem("token");
localStorage.removeItem("role");
window.location.href="login.html";
}

async function loadData(){
const tbody=document.querySelector("#tabel tbody");
tbody.innerHTML="<tr><td colspan='6'>Loading...</td></tr>";

try{
const res=await fetch(API_URL+"?action=list");
const data=await res.json();
tbody.innerHTML="";

data.forEach(row=>{
const ticketId=row.id||"-";
const nama=row.nama||"-";
const aset=row.aset||"-";
const deskripsi=row.deskripsi||"-";
const status=row.status||"Waiting";

let statusClass="waiting";
if(status==="On Progress") statusClass="process";
if(status==="Done") statusClass="done";

tbody.innerHTML+=`
<tr>
<td>${ticketId}</td>
<td>${nama}</td>
<td>${aset}</td>
<td>${deskripsi}</td>
<td><span class="status ${statusClass}">${status}</span></td>
<td><button onclick="openEditModal('${ticketId}','${status}')">Edit</button></td>
</tr>
`;
});

}catch(err){
tbody.innerHTML="<tr><td colspan='6'>Gagal memuat data</td></tr>";
}
}

function openEditModal(ticket,status){
document.getElementById("edit_ticket").value=ticket;
document.getElementById("edit_status").value=status;
document.getElementById("edit_catatan").value="";
document.getElementById("edit_vendor").value="";
document.getElementById("editModal").style.display="flex";
}

function closeModal(){
document.getElementById("editModal").style.display="none";
}

async function saveEdit(){
const ticket_id=document.getElementById("edit_ticket").value;
const status=document.getElementById("edit_status").value;
const catatan=document.getElementById("edit_catatan").value;
const vendor=document.getElementById("edit_vendor").value;

const formData=new FormData();
formData.append("action","updateTicket");
formData.append("ticket_id",ticket_id);
formData.append("status",status);
formData.append("catatan",catatan);
formData.append("vendor",vendor);
formData.append("estimasi","");

try{
const res=await fetch(API_URL,{method:"POST",body:formData});
const result=await res.json();
if(result.success){
closeModal();
loadData();
}else{
alert("Update gagal");
}
}catch{
alert("Error koneksi");
}
}

loadData();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Maintenance Aset</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.desc-box{
position:relative;
}

.close-btn{
position:absolute;
top:12px;
right:15px;
font-size:22px;
font-weight:bold;
color:#e74c3c;
cursor:pointer;
transition:0.2s;
}

.close-btn:hover{
color:#c0392b;
transform:scale(1.1);
}
  
.container{
width:95%;
max-width:1300px;
margin:30px auto;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:#2c5364;
color:white;
}

.logout-btn{
background:#e74c3c;
border:none;
padding:8px 15px;
color:white;
border-radius:6px;
cursor:pointer;
}

.content{
padding:25px;
overflow-x:auto;
}

.filter-box{
margin-bottom:15px;
}

table{
width:100%;
min-width:1100px;
border-collapse:collapse;
font-size:14px;
}

th{
background:#2c5364;
color:white;
padding:12px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f8f8f8;
}

.status{
padding:4px 10px;
border-radius:20px;
color:white;
font-size:12px;
font-weight:600;
}

.waiting{background:#f39c12;}
.pending{background:#9b59b6;}
.process{background:#3498db;}
.done{background:#27ae60;}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2c5364;
color:white;
}

button:disabled{
background:#bdc3c7;
cursor:not-allowed;
}

/* MODAL */
.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
width:95%;
max-width:500px;
padding:25px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

.modal-content h3{
text-align:center;
color:#2c5364;
margin-bottom:20px;
}

.modal-content label{
display:block;
margin-top:12px;
font-size:13px;
font-weight:600;
}

.modal-content input,
.modal-content textarea,
.modal-content select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
box-sizing:border-box;
}

.modal-content button{
width:100%;
padding:12px;
margin-top:12px;
border-radius:8px;
font-weight:600;
}

.save-btn{background:#27ae60;}
.cancel-btn{background:#95a5a6;}

.footer{
text-align:center;
padding:15px;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<script>
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(!token || role !== "admin"){
alert("Akses ditolak");
window.location.href="login.html";
}
</script>

<div class="container">

<div class="header">
<h2>Admin Panel - Maintenance Aset</h2>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="content">

<div class="filter-box">
<label><strong>Filter Status:</strong></label>
<select id="filterStatus" onchange="applyFilter()">
<option value="All">All</option>
<option value="Waiting">Waiting</option>
<option value="Pending">Pending</option>
<option value="On Progress">On Progress</option>
<option value="Done">Done</option>
</select>
</div>

<table id="tabel">
<thead>
<tr>
<th>Ticket</th>
<th>Pelapor</th>
<th>Cabang</th>
<th>Aset</th>
<th>Deskripsi</th>
<th>Status</th>
<th>Vendor</th>
<th>Update</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr><td colspan="9">Loading...</td></tr>
</tbody>
</table>

</div>

<div class="footer">
Maintenance Asset Management System
</div>
</div>

<!-- MODAL EDIT -->
<div id="editModal" class="modal">
<div class="modal-content">
<h3>Edit Ticket</h3>

<label>Ticket ID</label>
<input id="edit_ticket" readonly>

<label>Status</label>
<select id="edit_status">
<option value="Waiting">Waiting</option>
<option value="Pending">Pending</option>
<option value="On Progress">On Progress</option>
<option value="Done">Done</option>
</select>

<label>Catatan GA</label>
<textarea id="edit_catatan"></textarea>

<label>Vendor</label>
<input id="edit_vendor">

<button class="save-btn" onclick="saveEdit()">Save</button>
<button class="cancel-btn" onclick="closeModal()">Cancel</button>
</div>
</div>

<!-- MODAL DESKRIPSI -->
<div id="descModal" class="modal">
<div class="modal-content desc-box">

<span class="close-btn" onclick="closeDescModal()">&times;</span>

<h3>Deskripsi Kerusakan</h3>
<div id="descContent" style="margin-top:15px; line-height:1.6;"></div>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxWLiPuxIFd6Hy0PKUtx-mbgm_o2bWCT7Mog9wk1TGIszu-v7r8RvKfZLDDUvtSvhIC6w/exec";

let allTickets=[];

function logout(){
localStorage.removeItem("token");
localStorage.removeItem("role");
window.location.href="login.html";
}

function formatTanggalIndonesia(t){
if(!t) return "-";
const d=new Date(t);
if(isNaN(d)) return "-";
return String(d.getDate()).padStart(2,'0')+"/"+
String(d.getMonth()+1).padStart(2,'0')+"/"+
d.getFullYear();
}

async function loadData(){
const tbody=document.querySelector("#tabel tbody");
tbody.innerHTML="<tr><td colspan='9'>Loading...</td></tr>";
const res=await fetch(API_URL+"?action=list");
allTickets=await res.json();
renderTable(allTickets);
}

function renderTable(data){
const tbody=document.querySelector("#tabel tbody");
tbody.innerHTML="";

data.forEach(row=>{

const status=row.status||"Waiting";
let statusClass="waiting";
if(status==="Pending") statusClass="pending";
if(status==="On Progress") statusClass="process";
if(status==="Done") statusClass="done";

const disabled=status==="Done"?"disabled":"";

tbody.innerHTML+=`
<tr>
<td>${row.id||"-"}</td>
<td>${row.nama||"-"}</td>
<td>${row.departemen||"-"}</td>
<td>${row.aset||"-"}</td>
<td><button onclick="showDescription('${encodeURIComponent(row.deskripsi||"")}')">Lihat</button></td>
<td><span class="status ${statusClass}">${status}</span></td>
<td>${row.vendor||"-"}</td>
<td>${formatTanggalIndonesia(row.update)}</td>
<td>
<button ${disabled} onclick="openEditModal('${row.id}','${status}')">
${status==="Done"?"Close":"Edit"}
</button>
</td>
</tr>`;
});
}

function applyFilter(){
const selected=document.getElementById("filterStatus").value;
if(selected==="All"){ renderTable(allTickets); return; }
renderTable(allTickets.filter(t=>t.status===selected));
}

function showDescription(desc){
document.getElementById("descContent").innerText=
decodeURIComponent(desc)||"Tidak ada deskripsi.";
document.getElementById("descModal").style.display="flex";
}

function closeDescModal(){
document.getElementById("descModal").style.display="none";
}

function openEditModal(ticket,status){
if(status==="Done"){
alert("Ticket sudah selesai dan tidak dapat diedit kembali.");
return;
}
document.getElementById("edit_ticket").value=ticket;
document.getElementById("edit_status").value=status;
document.getElementById("editModal").style.display="flex";
}

function closeModal(){
document.getElementById("editModal").style.display="none";
}

async function saveEdit(){
const ticket_id=document.getElementById("edit_ticket").value;
const status=document.getElementById("edit_status").value;
const catatan=document.getElementById("edit_catatan").value;
const vendor=document.getElementById("edit_vendor").value;

const formData=new FormData();
formData.append("action","updateTicket");
formData.append("ticket_id",ticket_id);
formData.append("status",status);
formData.append("catatan",catatan);
formData.append("vendor",vendor);

const res=await fetch(API_URL,{method:"POST",body:formData});
const result=await res.json();

if(result.success){
closeModal();
loadData();
}else{
alert("Update gagal");
}
}

loadData();

</script>

</body>
</html>

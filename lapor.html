<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapor Kerusakan</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
  
body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
box-sizing:border-box;
}


.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:white;
width:90%;
max-width:420px;
padding:25px;
border-radius:12px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
position:relative;
text-align:center;
animation:fadeIn 0.2s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

.close-btn{
position:absolute;
top:10px;
right:15px;
font-size:22px;
font-weight:bold;
color:#e74c3c;
cursor:pointer;
}
  
.container{
background:white;
width:100%;
max-width:450px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
box-sizing:border-box;
}

h2{
text-align:center;
margin-top:0;
color:#333;
font-size:20px;
}

label{
display:block;
margin-top:12px;
font-size:14px;
font-weight:500;
}

input, textarea, select{
width:100%;
padding:12px;
margin-top:6px;
box-sizing:border-box;
font-size:14px;
border:1px solid #ccc;
border-radius:6px;
transition:0.3s;
}

input:focus,
textarea:focus,
select:focus{
border-color:#2c5364;
outline:none;
box-shadow:0 0 5px rgba(44,83,100,0.5);
}

textarea{
resize:vertical;
min-height:80px;
}

button{
width:100%;
padding:14px;
margin-top:18px;
background:#2c5364;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
background:#203a43;
}

#hasil{
margin-top:15px;
text-align:center;
font-size:14px;
}

a{
display:block;
margin-top:15px;
}

@media (max-width:480px){

.container{
padding:20px;
border-radius:10px;
}

h2{
font-size:18px;
}

}

</style>

</head>

<body>
<script>
const token = localStorage.getItem("token");

if(!token){
  alert("Silakan login terlebih dahulu");
  window.location.href="login.html";
}
</script>
  
<div class="container">

<h2>LAPOR KERUSAKAN</h2>

<form id="formLapor">
<label style="margin-top:10px; display:block;">Nama Pelapor</label>
<input type="text" id="nama" placeholder="Nama Lengkap">
<label style="margin-top:10px; display:block;">Cabang</label>
<input type="text" id="cabang" placeholder="Cabang Kerja">
<label style="margin-top:10px; display:block;">Nama Aset</label>
<input type="text" id="aset" placeholder="Nama benda yang dilaporkan">

<label style="margin-top:10px; display:block;">Kategori Barang</label>

<select id="kategori">
<option value="">Pilih Kategori Aset</option>
<option value="Elektronik">Elektronik</option>
<option value="Mesin">Mesin</option>
<option value="Furniture">Furniture</option>
<option value="Kendaraan">Kendaraan</option>
<option value="Bangunan">Bangunan</option>
</select>

<label style="margin-top:10px; display:block;">Deskripsi Kerusakan</label>
<textarea id="deskripsi" placeholder="Jelaskan tentang kerusakan yang ingin dilaporkan"></textarea>
<label style="margin-top:10px; display:block;">Upload Foto</label>
<input type="file" id="foto">

<button type="button" id="btnKirim" onclick="kirimLaporan()">
KIRIM LAPORAN
</button>

</form>

<div id="hasil"></div>

<br>

<a href="index.html">
<button style="
background:#6c757d;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
">
← Kembali ke Menu Utama
</button>
</a>
<!-- MODAL SUCCESS -->
<div id="successModal" class="modal">
  <div class="modal-content">

    <span class="close-btn" onclick="closeSuccessModal()">&times;</span>

    <h3 style="color:#2c5364;">Laporan Berhasil Dikirim</h3>

    <p style="margin-top:15px;">
      Ticket ID Anda:
    </p>

    <h2 id="modalTicketID" style="color:#27ae60;"></h2>

    <p style="margin-top:15px; font-size:14px; line-height:1.6;">
      <strong>PENTING:</strong><br>
      Silakan simpan atau screenshot Ticket ID ini.<br>
      Ticket ID diperlukan untuk melakukan tracking status laporan.
    </p>

  </div>
</div>
</div>

<script src="config.js"></script>
<script src="lapor.js"></script>

</body>
</html>
